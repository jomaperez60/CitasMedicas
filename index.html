<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CED - Sistema de Citas Médicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/CitasMedicas/assets/index-CcK5_PLi.js"></script>
    <link rel="stylesheet" crossorigin href="/CitasMedicas/assets/index-Ujzco3Pe.css">
  </head>
  <body>
    <div id="app" class="app-container">
      <header class="header glass">
        <div class="logo">
          <h1 style="color: var(--primary); font-size: 1.5rem;">CED <span style="color: var(--secondary); font-weight: 400; font-size: 1rem;">Citas Médicas</span></h1>
        </div>
        
        <div class="view-toggles">
          <button id="view-day" class="btn-toggle active">Vista Día</button>
          <button id="view-week" class="btn-toggle">Vista Semana</button>
        </div>

        <div class="date-nav">
          <button id="prev-day" class="btn">◀</button>
          <span id="current-date-display" style="font-weight: 600; margin: 0 1rem; min-width: 150px; text-align: center;"></span>
          <button id="next-day" class="btn">▶</button>
        </div>
        <div class="user-profile">
          <button id="add-appointment-btn" class="btn btn-primary">+ Nueva Cita</button>
        </div>
      </header>

      <aside class="sidebar glass">
        <section class="calendar-nav">
          <h3 style="font-size: 0.8rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em;">Calendario</h3>
          <div id="mini-calendar" class="mini-calendar">
            <!-- Dynamic mini-calendar days -->
          </div>
        </section>

        <section class="filter-section" style="margin-top: 2rem;">
          <h3 style="margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em;">Salas de Endoscopia</h3>
          <div id="rooms-filter" class="filter-group">
            <!-- Dynamic rooms checkboxes -->
          </div>
        </section>

        <section class="filter-section" style="margin-top: 2rem;">
          <h3 style="margin-bottom: 1rem; font-size: 0.8rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em;">Médicos</h3>
          <div id="doctors-filter" class="filter-group">
            <!-- Dynamic doctors checkboxes -->
          </div>
        </section>
      </aside>

      <main id="main-content" class="main-content">
        <div class="calendar-container">
          <div id="time-column" class="time-column">
            <!-- Dynamic time slots -->
          </div>
          <div id="calendar-grid" class="calendar-grid">
            <!-- Dynamic provider columns -->
          </div>
        </div>
      </main>
    </div>

    <!-- Modales -->
    <div id="appointment-modal" class="modal-overlay" style="display: none;">
      <div class="modal glass">
        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1.5rem;">
          <h2 id="modal-title">Agendar Cita</h2>
          <button type="button" id="delete-appointment-btn" class="btn btn-danger" style="display: none;">Eliminar</button>
        </div>
        <form id="appointment-form">
          <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 2;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Paciente</label>
              <input type="text" id="patient-name" required placeholder="Nombre completo" style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd;">
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Teléfono</label>
              <input type="tel" id="patient-phone" placeholder="8888-8888" style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd;">
            </div>
          </div>

          <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Médico / Sala</label>
              <select id="provider-id" style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd;"></select>
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Inicio</label>
              <input type="time" id="start-time" required style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd;">
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Procedimientos (puedes seleccionar varios)</label>
            <div id="types-selection" class="types-grid">
              <!-- Dynamic procedure types checkboxes -->
            </div>
          </div>

          <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Duración Estimada</label>
              <select id="duration" style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd;">
                <option value="15">15 min</option>
                <option value="30" selected>30 min</option>
                <option value="45">45 min</option>
                <option value="60">60 min</option>
                <option value="90">90 min</option>
                <option value="120">120 min</option>
              </select>
            </div>
            <div id="status-group" style="flex: 1; display: none;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Estado</label>
              <div class="status-options" style="display: flex; gap: 0.3rem;">
                <button type="button" class="btn status-btn" data-status="arrived" title="Llegó" style="padding: 0.5rem;">📍</button>
                <button type="button" class="btn status-btn" data-status="in_session" title="En Sesión" style="padding: 0.5rem;">🩺</button>
                <button type="button" class="btn status-btn" data-status="completed" title="Completado" style="padding: 0.5rem;">✅</button>
              </div>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 500;">Notas / Observaciones</label>
            <textarea id="appointment-notes" rows="3" placeholder="Detalles adicionales..." style="width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #ddd; resize: none;"></textarea>
          </div>

          <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 1rem;">
            <button type="button" id="cancel-modal" class="btn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Cita</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
