name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Asegúrate de que esta sea tu rama principal

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # La carpeta que Vite genera
          branch: gh-pages # La rama donde se subirá el sitio estático
