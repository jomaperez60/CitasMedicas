<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CED - Sistema de Citas Médicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/CitasMedicas/assets/index-BKPYIfUt.js"></script>
    <link rel="stylesheet" crossorigin href="/CitasMedicas/assets/index-FRIlp3N-.css">
  </head>
  <body>
    <div id="app" class="app-container">
      <header class="header glass">
        <div class="logo">
          <h1 style="color: var(--primary); font-size: 1.5rem;">CED <span style="color: var(--secondary); font-weight: 400; font-size: 1rem;">Citas Médicas</span></h1>
        </div>
        <div class="date-nav">
          <button id="prev-day" class="btn">◀</button>
          <span id="current-date-display" style="font-weight: 600; margin: 0 1rem;"></span>
          <button id="next-day" class="btn">▶</button>
        </div>
        <div class="user-profile">
          <button id="add-appointment-btn" class="btn btn-primary">+ Nueva Cita</button>
        </div>
      </header>

      <aside class="sidebar glass">
        <section class="filter-section">
          <h3 style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em;">Médicos</h3>
          <div id="doctors-filter" class="filter-group">
            <!-- Dynamic doctors checkboxes -->
          </div>
        </section>

        <section class="filter-section" style="margin-top: 2rem;">
          <h3 style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 0.05em;">Salas de Endoscopia</h3>
          <div id="rooms-filter" class="filter-group">
            <!-- Dynamic rooms checkboxes -->
          </div>
        </section>

        <section class="stats-section" style="margin-top: 3rem; padding: 1rem; background: rgba(37, 99, 235, 0.05); border-radius: 12px; border: 1px solid var(--border-color);">
          <p style="font-size: 0.8rem; color: var(--secondary);">Hoy:</p>
          <div id="quick-stats" style="margin-top: 0.5rem; font-weight: 600; font-size: 1.2rem;">
            0 Citas
          </div>
        </section>
      </aside>

      <main id="main-content" class="main-content">
        <div class="calendar-container">
          <div id="time-column" class="time-column">
            <div style="height: 60px;"></div> <!-- Spacer for header -->
            <!-- Dynamic time slots -->
          </div>
          <div id="calendar-grid" class="calendar-grid">
            <!-- Dynamic provider columns -->
          </div>
        </div>
      </main>
    </div>

    <!-- Modales -->
    <div id="appointment-modal" class="modal-overlay" style="display: none;">
      <div class="modal glass">
        <h2 id="modal-title" style="margin-bottom: 1.5rem;">Agendar Cita</h2>
        <form id="appointment-form">
          <div class="form-group" style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Paciente</label>
            <input type="text" id="patient-name" required placeholder="Nombre completo" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
          </div>
          <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Médico / Sala</label>
              <select id="provider-id" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;"></select>
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Tipo</label>
              <select id="appointment-type" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
                <option value="consultation">Consulta</option>
                <option value="endoscopy">Endoscopia</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Inicio</label>
              <input type="time" id="start-time" required style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
            </div>
            <div style="flex: 1;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Duración (min)</label>
              <select id="duration" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
                <option value="20">20 min</option>
                <option value="30" selected>30 min</option>
                <option value="60">60 min</option>
                <option value="120">120 min</option>
              </select>
            </div>
          </div>
          <div id="status-group" style="margin-bottom: 1.5rem; display: none;">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Estado del Paciente</label>
            <div class="status-options" style="display: flex; gap: 0.5rem;">
              <button type="button" class="btn status-btn" data-status="scheduled">Programada</button>
              <button type="button" class="btn status-btn" data-status="arrived">Llegó</button>
              <button type="button" class="btn status-btn" data-status="in_session">En Sesión</button>
              <button type="button" class="btn status-btn" data-status="completed">Completado</button>
            </div>
          </div>
          <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 1rem;">
            <button type="button" id="cancel-modal" class="btn">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar Cita</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
